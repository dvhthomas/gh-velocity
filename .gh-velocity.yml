# gh-velocity configuration
# Generated by: gh velocity config preflight -R dvhthomas/gh-velocity
# Date: 2026-03-12

# Scope: which issues/PRs to analyze (GitHub search syntax).
# Override per-run with: --scope 'label:"priority:high"'
scope:
  query: "repo:dvhthomas/gh-velocity"

# Issue/PR classification — first matching category wins; unmatched = "other".
# Matchers: label:<name>, type:<name>, title:/<regex>/i
quality:
  categories:
    - name: bug
      match:
        - "label:bug"
        - "title:/\\bfix(es|ed)?\\b/i"
        - "title:/^fix[\\(: ]/i"
        - "title:/^bug[\\(: ]/i"
    - name: feature
      match:
        - "label:enhancement"
        - "title:/^feat[\\(: ]/i"
        - "title:/^feature[\\(: ]/i"
        - "title:/^add[\\(: ]/i"
    - name: chore
      match:
        - "title:/^refactor[\\(: ]/i"
        - "title:/^chore[\\(: ]/i"
        - "title:/^ci[\\(: ]/i"
        - "title:/^build[\\(: ]/i"
    - name: docs
      match:
        - "label:documentation"
        - "title:/^docs?[\\(: ]/i"
  hotfix_window_hours: 72

# Commit message scanning
commit_ref:
  patterns: ["closes"]

# Cycle time strategy: issue
cycle_time:
  strategy: issue

# Exclude bot accounts from metrics.
exclude_users:
  - "dependabot[bot]"

# Minimum seconds between GitHub search API calls.
# Prevents secondary (abuse) rate limits which trigger on burst traffic.
api_throttle_seconds: 2

# Projects v2 board (auto-detected)
# CI/Actions: GITHUB_TOKEN cannot access projects. Create a classic PAT with
# 'project' scope: https://github.com/settings/tokens/new?scopes=project&description=gh-velocity
project:
  url: "https://github.com/users/dvhthomas/projects/1"
  status_field: "Status"

# Lifecycle stages mapped from board columns
lifecycle:
  backlog:
    project_status: ["Backlog", "Ready"]
  in-progress:
    project_status: ["In progress"]
  in-review:
    project_status: ["In review"]
  done:
    project_status: ["Done"]

# Velocity measurement
velocity:
  unit: issues
  effort:
    strategy: attribute
    attribute:
      - query: "label:enhancement"
        value: 3
      - query: "label:bug"
        value: 2
      - query: "label:documentation"
        value: 1
  iteration:
    strategy: fixed
    fixed:
      length: "14d"
      anchor: "2026-03-10"
    count: 6

# Post bulk reports (--post) as Discussion posts.
# CI/Actions: requires 'discussions: write' in workflow permissions.
discussions:
  category: General

