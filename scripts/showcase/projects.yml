# Projects to include in the velocity showcase.
# Each config becomes a preflight + report run.
#
# Fields:
#   name:    display name for reports and discussions (required)
#   repo:    owner/repo (required, used with -R flag and as filter key)
#   project: GitHub Projects board URL (optional, used with --project-url flag)
#
# Keep this list small (≤6) to stay within API rate limits.

configs:
  - name: GitHub CLI
    repo: cli/cli
  - name: Kubernetes
    repo: kubernetes/kubernetes
  - name: uv
    repo: astral-sh/uv
  - name: React
    repo: facebook/react
  - name: k6
    repo: grafana/k6
  - name: CalcMark
    repo: CalcMark/go-calcmark
  - name: gh-velocity
    repo: dvhthomas/gh-velocity
