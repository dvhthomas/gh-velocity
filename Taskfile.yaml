version: '3'

vars:
  BINARY_NAME: gh-velocity

tasks:
  default:
    desc: Show available tasks
    cmds:
      - task --list

  # ── Testing ────────────────────────────────────────────────────────

  test:
    desc: Run all tests
    cmds:
      - go test ./... -v

  test:coverage:
    desc: Run tests with coverage report
    cmds:
      - go test ./... -coverprofile=coverage.out
      - go tool cover -html=coverage.out -o coverage.html
      - echo 'Coverage report generated at coverage.html'

  # ── Build ──────────────────────────────────────────────────────────

  build:
    desc: Build CLI for current platform
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
      BUILD_TIME:
        sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
    cmds:
      - go build -ldflags "-s -w -X main.Version={{.VERSION}} -X main.BuildTime={{.BUILD_TIME}}" -o {{.BINARY_NAME}} .
      - echo 'Built {{.BINARY_NAME}} {{.VERSION}}'

  # ── Quality ────────────────────────────────────────────────────────

  lint:
    desc: Run basic linters (fmt, vet)
    cmds:
      - go fmt ./...
      - go vet ./...
      - echo '✓ Basic linting passed'

  staticcheck:
    internal: true
    cmds:
      - go run honnef.co/go/tools/cmd/staticcheck@latest ./...
      - echo '✓ Staticcheck passed'

  vulncheck:
    internal: true
    cmds:
      - go run golang.org/x/vuln/cmd/govulncheck@latest ./...
      - echo '✓ Vulnerability check passed'

  check:graphql-injection:
    internal: true
    cmds:
      - bash scripts/check-graphql-injection.sh

  install:
    desc: Build, remove old extension, install fresh, clean config
    deps: [build]
    cmds:
      - rm -f .gh-velocity.yml
      - gh extension remove velocity 2>/dev/null || true
      - gh extension install .
      - gh velocity version

  smoke:
    desc: Run smoke tests against real GitHub repos (requires gh auth)
    deps: [build]
    cmds:
      - bash scripts/smoke-test.sh

  gen:configs:
    desc: Generate configs via preflight for example repos (writes to output/configs/)
    deps: [build]
    cmds:
      - rm -rf output/configs && mkdir -p output/configs
      - bash scripts/generate-config.sh cli/cli
      - sleep 5
      - bash scripts/generate-config.sh kubernetes/kubernetes
      - sleep 5
      - bash scripts/generate-config.sh hashicorp/terraform
      - sleep 5
      - bash scripts/generate-config.sh astral-sh/uv
      - sleep 5
      - bash scripts/generate-config.sh facebook/react
      - sleep 5
      - bash scripts/generate-config.sh dvhthomas/gh-velocity --project-url https://github.com/users/dvhthomas/projects/1

  e2e:configs:
    desc: Run E2E tests with example configs against real OSS repos
    deps: [build]
    cmds:
      - bash scripts/e2e-configs.sh

  test:integration:
    desc: Run integration tests using the installed gh velocity extension
    deps: [install]
    cmds:
      - bash scripts/smoke-test-ext.sh

  test:integration:api:
    desc: Run API integration tests against real GitHub project boards (requires gh auth)
    cmds:
      - go test -tags=integration -run TestListProjectItemsWithFields -v ./internal/github/ -timeout 3m

  tidy:
    internal: true
    cmds:
      - go mod tidy
      - echo '✓ go mod tidy passed'

  modernize:
    internal: true
    cmds:
      - go run golang.org/x/tools/go/analysis/passes/modernize/cmd/modernize@latest -fix ./...
      - echo '✓ Modernize passed'

  quality:
    desc: Run all quality checks (recommended before commit)
    cmds:
      - task: tidy
      - task: modernize
      - task: test
      - task: lint
      - task: staticcheck
      - task: vulncheck
      - task: check:graphql-injection
      - echo '✓ All quality checks passed'

  # ── Release ──────────────────────────────────────────────────────

  release:preflight:
    desc: Pre-release validation (run before tagging)
    cmds:
      - task: quality
      - bash scripts/prerelease-analysis.sh
      - echo '✓ All pre-release checks passed — ready to tag'

  # ── Documentation ─────────────────────────────────────────────────

  docs:generate:
    internal: true
    deps: [build]
    cmds:
      - go run ./cmd/gendocs

  build:site:
    desc: Build the Hugo documentation site (generate CLI reference + Hugo build)
    deps: [docs:generate]
    cmds:
      - hugo --source site --minify --gc
      - echo '✓ Site built to site/public/'

  site:
    desc: Start Hugo dev server with live reload
    deps: [docs:generate]
    cmds:
      - hugo server --source site --buildDrafts --navigateToChanged

  clean:site:
    desc: Clean generated site output
    cmds:
      - rm -rf site/public site/resources
      - rm -rf site/content/reference/commands/gh-velocity*.md
      - echo '✓ Site cleaned'

  # ── Maintenance ────────────────────────────────────────────────────

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -f {{.BINARY_NAME}}
      - rm -rf dist/
      - rm -f coverage.out coverage.html
      - go clean -cache
