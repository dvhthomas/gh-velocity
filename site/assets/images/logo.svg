<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 40" shape-rendering="crispEdges">
  <!-- 8-bit tortoise mascot in fresh green (#22C55E) -->
  <!-- Shell -->
  <rect x="22" y="2" width="20" height="2" fill="#22C55E"/>
  <rect x="18" y="4" width="28" height="2" fill="#22C55E"/>
  <rect x="16" y="6" width="32" height="2" fill="#22C55E"/>
  <rect x="16" y="8" width="32" height="2" fill="#16A34A"/>
  <rect x="16" y="10" width="32" height="2" fill="#22C55E"/>
  <rect x="16" y="12" width="32" height="2" fill="#16A34A"/>
  <rect x="16" y="14" width="32" height="2" fill="#22C55E"/>
  <rect x="18" y="16" width="28" height="2" fill="#16A34A"/>
  <rect x="20" y="18" width="24" height="2" fill="#22C55E"/>
  <!-- Shell pattern (darker squares) -->
  <rect x="22" y="6" width="4" height="4" fill="#16A34A"/>
  <rect x="30" y="6" width="4" height="4" fill="#16A34A"/>
  <rect x="38" y="6" width="4" height="4" fill="#16A34A"/>
  <rect x="26" y="12" width="4" height="4" fill="#22C55E"/>
  <rect x="34" y="12" width="4" height="4" fill="#22C55E"/>
  <!-- Head (right side) -->
  <rect x="48" y="8" width="6" height="2" fill="#22C55E"/>
  <rect x="50" y="6" width="6" height="2" fill="#22C55E"/>
  <rect x="52" y="4" width="6" height="2" fill="#22C55E"/>
  <rect x="54" y="6" width="2" height="2" fill="#166534"/><!-- eye -->
  <rect x="48" y="10" width="8" height="2" fill="#22C55E"/>
  <rect x="50" y="12" width="4" height="2" fill="#22C55E"/>
  <!-- Legs -->
  <rect x="20" y="20" width="4" height="4" fill="#22C55E"/>
  <rect x="18" y="24" width="4" height="2" fill="#22C55E"/>
  <rect x="40" y="20" width="4" height="4" fill="#22C55E"/>
  <rect x="38" y="24" width="4" height="2" fill="#22C55E"/>
  <!-- Tail (left side) -->
  <rect x="14" y="14" width="4" height="2" fill="#22C55E"/>
  <rect x="10" y="12" width="4" height="2" fill="#22C55E"/>
  <rect x="8" y="10" width="4" height="2" fill="#22C55E"/>
</svg>
