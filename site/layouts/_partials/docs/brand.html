{{- $logo := resources.Get "images/logo.svg" | fingerprint -}}
<h2 class="book-brand">
  <a class="flex align-center" href="{{ cond (not .Site.Home.File) .Sites.Default.Home.RelPermalink .Site.Home.RelPermalink }}">
    <img src="{{ $logo.RelPermalink }}" alt="Shelly" style="width: 28px; height: auto; margin-right: 8px; image-rendering: pixelated;" />
    <span>{{ .Site.Title }}</span>
  </a>
</h2>
