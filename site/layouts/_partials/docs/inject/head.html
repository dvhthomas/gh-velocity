{{- $favicon := resources.Get "favicon.svg" | fingerprint -}}
{{- $shelly := resources.Get "images/logo.svg" | fingerprint -}}
<link rel="icon" href="{{ $favicon.RelPermalink }}" type="image/svg+xml">

<style>
  :root {
    --font-heading: ui-rounded, 'Hiragino Maru Gothic ProN', system-ui, sans-serif;
    --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
    --color-brand: #22C55E;
  }

  /* Headings: rounded system font, bold and tight */
  .book-article h1,
  .book-article h2,
  .book-article h3,
  .book-brand span {
    font-family: var(--font-heading);
    font-weight: 800;
    letter-spacing: -0.02em;
  }

  /* Body: system sans — fast, native, readable */
  body,
  .book-article p,
  .book-article li,
  .book-article td,
  .book-menu-content,
  .book-toc-content {
    font-family: var(--font-body);
  }

  /* Code: system monospace */
  code, pre, .book-article code, .book-article pre {
    font-family: var(--font-mono);
    font-size: 0.9em;
  }

  /* Shelly before every h1 */
  .book-article h1::before {
    content: "";
    display: inline-block;
    width: 1.2em;
    height: 0.9em;
    margin-right: 0.3em;
    vertical-align: baseline;
    background: url("{{ $shelly.RelPermalink }}") no-repeat center / contain;
    image-rendering: pixelated;
  }

  /* Exclude Shelly on landing page hero */
  .book-article h1.no-shelly::before {
    display: none;
  }

  /* Brand color accent on links */
  .book-article a { color: var(--color-brand); }
  .book-article a:hover { color: #16A34A; }
</style>
