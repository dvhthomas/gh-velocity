{{- $favicon := resources.Get "favicon.svg" | fingerprint -}}
{{- $shelly := resources.Get "images/logo.svg" | fingerprint -}}
{{- $fontTitle := resources.Get "fonts/press-start-2p.woff2" | fingerprint -}}
{{- $og := resources.Get "images/og.png" | fingerprint -}}
<link rel="icon" href="{{ $favicon.RelPermalink }}" type="image/svg+xml">
<meta property="og:title" content="{{ .Title | default .Site.Title }}">
<meta property="og:description" content="{{ .Site.Params.description }}">
<meta property="og:image" content="{{ $og.Permalink }}">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">

<style>
  @font-face {
    font-family: 'Press Start 2P';
    src: url('{{ $fontTitle.RelPermalink }}') format('woff2');
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --font-title: 'Press Start 2P', monospace;
    --font-heading: ui-rounded, 'Hiragino Maru Gothic ProN', system-ui, sans-serif;
    --font-body: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    --font-mono: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace;
    --color-brand: #22C55E;
  }

  /* Page titles: 8-bit pixel font (h1 only) */
  .book-article h1,
  .book-brand span {
    font-family: var(--font-title);
    font-size: 1.4rem;
    line-height: 1.6;
  }
  .book-brand span { font-size: 0.7rem; }

  /* Section headings: Space Grotesk (swap to system rounded via CSS var above) */
  .book-article h2,
  .book-article h3 {
    font-family: var(--font-heading);
    font-weight: 700;
    letter-spacing: -0.01em;
  }

  /* Body: system sans */
  body,
  .book-article p,
  .book-article li,
  .book-article td,
  .book-menu-content,
  .book-toc-content {
    font-family: var(--font-body);
  }

  /* Code: system monospace */
  code, pre, .book-article code, .book-article pre {
    font-family: var(--font-mono);
    font-size: 0.9em;
  }

  /* Shelly before every h1 */
  .book-article h1::before {
    content: "";
    display: inline-block;
    width: 1.4em;
    height: 1em;
    margin-right: 0.3em;
    vertical-align: baseline;
    background: url("{{ $shelly.RelPermalink }}") no-repeat center / contain;
    image-rendering: pixelated;
  }

  /* Exclude Shelly on landing page hero */
  .book-article h1.no-shelly::before {
    display: none;
  }

  /* Shelly Says: style TIP callouts with mascot */
  .book-hint.tip {
    position: relative;
    padding-top: 2.2em;
  }
  .book-hint.tip::before {
    content: "Shelly says";
    position: absolute;
    top: 0.5em;
    left: 1em;
    font-family: var(--font-title);
    font-size: 0.55rem;
    color: var(--color-brand);
    letter-spacing: 0.02em;
    padding-left: 1.6em;
    background: url("{{ $shelly.RelPermalink }}") no-repeat left center / 1.2em;
    image-rendering: pixelated;
  }

  /* Brand color accent on links */
  .book-article a { color: var(--color-brand); }
  .book-article a:hover { color: #16A34A; }
</style>
