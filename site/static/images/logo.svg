<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 30" shape-rendering="crispEdges">
  <!-- 8-bit tortoise, single color, side view facing right -->
  <g fill="#22C55E">
    <!-- Shell dome -->
    <rect x="12" y="2" width="12" height="2"/>
    <rect x="10" y="4" width="16" height="2"/>
    <rect x="8" y="6" width="20" height="2"/>
    <rect x="8" y="8" width="20" height="2"/>
    <rect x="8" y="10" width="20" height="2"/>
    <rect x="8" y="12" width="20" height="2"/>
    <rect x="10" y="14" width="16" height="2"/>
    <!-- Body underside -->
    <rect x="10" y="16" width="18" height="2"/>
    <!-- Head and neck -->
    <rect x="28" y="8" width="2" height="2"/>
    <rect x="28" y="10" width="2" height="2"/>
    <rect x="30" y="6" width="2" height="2"/>
    <rect x="30" y="8" width="4" height="2"/>
    <rect x="30" y="10" width="4" height="2"/>
    <rect x="30" y="12" width="2" height="2"/>
    <!-- Eye (white cutout) -->
    <rect x="32" y="8" width="2" height="2" fill="white"/>
    <!-- Front leg -->
    <rect x="24" y="18" width="4" height="2"/>
    <rect x="24" y="20" width="4" height="2"/>
    <rect x="22" y="22" width="6" height="2"/>
    <!-- Back leg -->
    <rect x="10" y="18" width="4" height="2"/>
    <rect x="10" y="20" width="4" height="2"/>
    <rect x="8" y="22" width="6" height="2"/>
    <!-- Tail -->
    <rect x="6" y="14" width="4" height="2"/>
    <rect x="4" y="12" width="4" height="2"/>
    <rect x="2" y="10" width="2" height="2"/>
  </g>
</svg>
