<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" shape-rendering="crispEdges">
  <!-- 8-bit tortoise mascot -->
  <g id="tortoise">
    <!-- Shell -->
    <rect x="22" y="2" width="20" height="2" fill="#22C55E"/>
    <rect x="18" y="4" width="28" height="2" fill="#22C55E"/>
    <rect x="16" y="6" width="32" height="2" fill="#22C55E"/>
    <rect x="16" y="8" width="32" height="2" fill="#16A34A"/>
    <rect x="16" y="10" width="32" height="2" fill="#22C55E"/>
    <rect x="16" y="12" width="32" height="2" fill="#16A34A"/>
    <rect x="16" y="14" width="32" height="2" fill="#22C55E"/>
    <rect x="18" y="16" width="28" height="2" fill="#16A34A"/>
    <rect x="20" y="18" width="24" height="2" fill="#22C55E"/>
    <!-- Shell pattern -->
    <rect x="22" y="6" width="4" height="4" fill="#16A34A"/>
    <rect x="30" y="6" width="4" height="4" fill="#16A34A"/>
    <rect x="38" y="6" width="4" height="4" fill="#16A34A"/>
    <rect x="26" y="12" width="4" height="4" fill="#22C55E"/>
    <rect x="34" y="12" width="4" height="4" fill="#22C55E"/>
    <!-- Head -->
    <rect x="48" y="8" width="6" height="2" fill="#22C55E"/>
    <rect x="50" y="6" width="6" height="2" fill="#22C55E"/>
    <rect x="52" y="4" width="6" height="2" fill="#22C55E"/>
    <rect x="54" y="6" width="2" height="2" fill="#166534"/>
    <rect x="48" y="10" width="8" height="2" fill="#22C55E"/>
    <rect x="50" y="12" width="4" height="2" fill="#22C55E"/>
    <!-- Legs -->
    <rect x="20" y="20" width="4" height="4" fill="#22C55E"/>
    <rect x="18" y="24" width="4" height="2" fill="#22C55E"/>
    <rect x="40" y="20" width="4" height="4" fill="#22C55E"/>
    <rect x="38" y="24" width="4" height="2" fill="#22C55E"/>
    <!-- Tail -->
    <rect x="14" y="14" width="4" height="2" fill="#22C55E"/>
    <rect x="10" y="12" width="4" height="2" fill="#22C55E"/>
    <rect x="8" y="10" width="4" height="2" fill="#22C55E"/>
  </g>
  <!-- "velocity" in 8-bit italic style (shifted right 1px per 2 rows) -->
  <g id="text" fill="#22C55E" transform="translate(68, 8)">
    <!-- v -->
    <rect x="0" y="0" width="2" height="8" fill="#22C55E"/>
    <rect x="6" y="0" width="2" height="8" fill="#22C55E"/>
    <rect x="2" y="8" width="2" height="4" fill="#22C55E"/>
    <rect x="4" y="8" width="2" height="4" fill="#22C55E"/>
    <!-- e -->
    <rect x="10" y="0" width="6" height="2" fill="#22C55E"/>
    <rect x="10" y="0" width="2" height="12" fill="#22C55E"/>
    <rect x="10" y="4" width="6" height="2" fill="#22C55E"/>
    <rect x="10" y="10" width="6" height="2" fill="#22C55E"/>
    <!-- l -->
    <rect x="18" y="0" width="2" height="12" fill="#22C55E"/>
    <!-- o -->
    <rect x="22" y="0" width="6" height="2" fill="#22C55E"/>
    <rect x="22" y="0" width="2" height="12" fill="#22C55E"/>
    <rect x="26" y="0" width="2" height="12" fill="#22C55E"/>
    <rect x="22" y="10" width="6" height="2" fill="#22C55E"/>
    <!-- c -->
    <rect x="30" y="0" width="6" height="2" fill="#22C55E"/>
    <rect x="30" y="0" width="2" height="12" fill="#22C55E"/>
    <rect x="30" y="10" width="6" height="2" fill="#22C55E"/>
    <!-- i -->
    <rect x="38" y="0" width="2" height="2" fill="#22C55E"/>
    <rect x="38" y="4" width="2" height="8" fill="#22C55E"/>
    <!-- t -->
    <rect x="42" y="0" width="6" height="2" fill="#22C55E"/>
    <rect x="44" y="0" width="2" height="12" fill="#22C55E"/>
    <rect x="42" y="10" width="6" height="2" fill="#22C55E"/>
    <!-- y -->
    <rect x="50" y="0" width="2" height="6" fill="#22C55E"/>
    <rect x="56" y="0" width="2" height="12" fill="#22C55E"/>
    <rect x="50" y="4" width="8" height="2" fill="#22C55E"/>
    <rect x="50" y="10" width="8" height="2" fill="#22C55E"/>
  </g>
</svg>
