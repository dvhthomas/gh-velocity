# gh-velocity configuration for velocity smoke tests
# Based on cli-cli.yml with velocity section added.
scope:
  query: "repo:cli/cli"

quality:
  categories:
    - name: bug
      match:
        - "label:bug"
    - name: feature
      match:
        - "label:enhancement"
  hotfix_window_hours: 72

commit_ref:
  patterns: ["closes"]

cycle_time:
  strategy: pr

velocity:
  unit: issues
  effort:
    strategy: count
  iteration:
    strategy: fixed
    fixed:
      length: "14d"
      anchor: "2026-01-06"
    count: 6
