# gh-velocity configuration
# Generated by: gh velocity config preflight -R dvhthomas/gh-velocity
# Date: 2026-03-11

# Scope: which issues/PRs to analyze (GitHub search syntax).
# Override per-run with: --scope 'label:"priority:high"'
scope:
  query: "repo:dvhthomas/gh-velocity"

# Issue/PR classification — first matching category wins; unmatched = "other".
# Matchers: label:<name>, type:<name>, title:/<regex>/i
quality:
  categories:
    - name: feature
      match:
        - "title:/^feat[\\(: ]/i"
    - name: chore
      match:
        - "title:/^refactor[\\(: ]/i"
    - name: docs
      match:
        - "title:/^docs?[\\(: ]/i"
  hotfix_window_hours: 72

# Commit message scanning
commit_ref:
  patterns: ["closes"]

# Cycle time strategy: project-board
cycle_time:
  strategy: project-board

# Projects v2 board (auto-detected)
project:
  url: "https://github.com/users/dvhthomas/projects/1"
  status_field: "Status"

# Lifecycle stages mapped from board columns
lifecycle:
  backlog:
    project_status: ["Backlog"]
  in-progress:
    project_status: ["In progress"]
  in-review:
    project_status: ["In review"]
  done:
    project_status: ["Done"]
  # unmapped: "Ready"

# Exclude bot accounts from metrics.
# These are filtered via -author: qualifiers in search queries.
# exclude_users:
#   - "dependabot[bot]"
#   - "renovate[bot]"
