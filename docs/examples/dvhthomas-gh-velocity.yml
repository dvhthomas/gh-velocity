# gh-velocity configuration
# Generated by: gh velocity config preflight -R dvhthomas/gh-velocity
# Date: 2026-03-11
#
# Using project board: Project Tracker (#1)
# Project board detected — using project-board strategy for cycle time
# Discussions are enabled — --post can create Discussion posts
# Token scopes: gist, project, read:org, repo, workflow
# Config verification: YAML parses cleanly
# Config verification: 3 categories defined, all matchers valid

# Scope: which issues/PRs to analyze (GitHub search syntax)
# Narrow with labels, assignees, milestones, etc.:
#   query: "repo:owner/repo label:team-backend"
#   query: "org:myorg label:bug"  # org-wide
# Override per-run with: --scope 'label:"priority:high"'
scope:
  query: "repo:dvhthomas/gh-velocity"

# Issue/PR classification — assigns each item to a category.
# Each entry in 'match' is a matcher string. Supported formats:
#   label:<name>          — matches a GitHub label (case-insensitive)
#   type:<name>           — matches a GitHub Issue Type (exact)
#   title:/<regex>/       — matches the title with a Go regex
#   title:/<regex>/i      — same, but case-insensitive
# First category to match wins. Unmatched items are classified as "other".
quality:
  categories:
    - name: feature
      match:
        - "title:/^feat[\\(: ]/i"
    - name: chore
      match:
        - "title:/^refactor[\\(: ]/i"
    - name: docs
      match:
        - "title:/^docs?[\\(: ]/i"
  hotfix_window_hours: 72

# Match evidence (last 30 days of issues + PRs):
#   bug / label:bug — 0 matches (review this matcher)
#   bug / title:/^fix[\(: ]/i — 0 matches (review this matcher)
#   bug / title:/^bug[\(: ]/i — 0 matches (review this matcher)
#   bug / title:/\bfix(es|ed)?\b/i — 0 matches (review this matcher)
#   feature / title:/^feat[\(: ]/i — 26 matches, e.g. #24 feat(verbose): debug output, preflight updates, smoke tests
#   feature / label:enhancement — 0 matches (review this matcher)
#   feature / title:/^feature[\(: ]/i — 0 matches (review this matcher)
#   feature / title:/^add[\(: ]/i — 0 matches (review this matcher)
#   chore / title:/^refactor[\(: ]/i — 1 matches, e.g. #9 refactor: rename release subcommand to quality release
#   chore / title:/^chore[\(: ]/i — 0 matches (review this matcher)
#   chore / title:/^ci[\(: ]/i — 0 matches (review this matcher)
#   chore / title:/^build[\(: ]/i — 0 matches (review this matcher)
#   docs / title:/^docs?[\(: ]/i — 1 matches, e.g. #6 docs: Add example configs for real OSS projects
#   docs / label:documentation — 0 matches (review this matcher)

# Commit message scanning
commit_ref:
  patterns: ["closes"]

# Cycle time strategy: project-board
cycle_time:
  strategy: project-board

# Projects v2 board (auto-detected)
project:
  url: "https://github.com/users/dvhthomas/projects/1"
  status_field: "Status"

# Lifecycle stages mapped from board columns
lifecycle:
  backlog:
    project_status: ["Backlog"]
  in-progress:
    project_status: ["In progress"]
  in-review:
    project_status: ["In review"]
  done:
    project_status: ["Done"]
  # unmapped: "Ready"

# Posting readiness (for --post flag):
#
# Required scopes per feature:
#   --post to issue/PR comments:  repo
#   --post to discussions:        repo (+ discussions enabled)
#   project board queries:        project, read:org (if org project)
#
# GitHub Actions: set permissions in workflow YAML:
#   permissions:
#     issues: write        # for --post to issue comments
#     pull-requests: write  # for --post to PR comments
#     discussions: write    # for --post to discussions
#
#   discussions: enabled
#   token scopes: gist, project, read:org, repo, workflow

