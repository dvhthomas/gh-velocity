# gh-velocity configuration
# Generated by: gh velocity config preflight -R facebook/react
# Date: 2026-03-11
#
# More PRs than issues in the last 30 days — PR-centric workflow detected
# Discussions are disabled — enable them in repo settings for bulk --post
# Token scopes: gist, project, read:org, repo, workflow
# Config verification: YAML parses cleanly
# Config verification: 2 categories defined, all matchers valid

# Scope: which issues/PRs to analyze (GitHub search syntax)
# Narrow with labels, assignees, milestones, etc.:
#   query: "repo:owner/repo label:team-backend"
#   query: "org:myorg label:bug"  # org-wide
# Override per-run with: --scope 'label:"priority:high"'
scope:
  query: "repo:facebook/react"

# Issue/PR classification — assigns each item to a category.
# Each entry in 'match' is a matcher string. Supported formats:
#   label:<name>          — matches a GitHub label (case-insensitive)
#   type:<name>           — matches a GitHub Issue Type (exact)
#   title:/<regex>/       — matches the title with a Go regex
#   title:/<regex>/i      — same, but case-insensitive
# First category to match wins. Unmatched items are classified as "other".
quality:
  categories:
    - name: bug
      match:
        - "label:Type: Bug"
    - name: feature
      match:
        - "title:/^add[\\(: ]/i"
  hotfix_window_hours: 72

# Match evidence (last 30 days of issues + PRs):
#   bug / title:/^bug[\(: ]/i — 26 matches, e.g. #36002 Bug: why not Signal
#   bug / title:/\bfix(es|ed)?\b/i — 15 matches, e.g. #35224 Title: Fix minor typo/formatting inconsistency in React d...
#   bug / label:Type: Bug — 9 matches, e.g. #35954 [DevTools Bug]: confused on prerender pages and resulting...
#   bug / title:/^fix[\(: ]/i — 2 matches, e.g. #35919 fix: remove unused variable to fix linter
#   bug / label:Type: Regression — 0 matches (review this matcher)
#   feature / title:/^add[\(: ]/i — 1 matches, e.g. #35947 Add support for event information in React scheduler trac...
#   feature / label:Type: Enhancement — 0 matches (review this matcher)
#   feature / label:Type: Feature Request — 0 matches (review this matcher)
#   feature / title:/^feat[\(: ]/i — 0 matches (review this matcher)
#   feature / title:/^feature[\(: ]/i — 0 matches (review this matcher)
#   chore / title:/^chore[\(: ]/i — 0 matches (review this matcher)
#   chore / title:/^refactor[\(: ]/i — 0 matches (review this matcher)
#   chore / title:/^ci[\(: ]/i — 0 matches (review this matcher)
#   chore / title:/^build[\(: ]/i — 0 matches (review this matcher)
#   docs / title:/^docs?[\(: ]/i — 0 matches (review this matcher)

# Commit message scanning
commit_ref:
  patterns: ["closes"]

# Cycle time strategy: pr
cycle_time:
  strategy: pr

# Lifecycle: how commands identify work stages
# Each stage has a query (GitHub search qualifiers) that commands append.
# With a project board, add project_status arrays for board-based filtering.
lifecycle:
  done:
    query: "is:closed"
  backlog:
    query: "is:open label:\"Resolution: Backlog\""

# Posting readiness (for --post flag):
#
# Required scopes per feature:
#   --post to issue/PR comments:  repo
#   --post to discussions:        repo (+ discussions enabled)
#   project board queries:        project, read:org (if org project)
#
# GitHub Actions: set permissions in workflow YAML:
#   permissions:
#     issues: write        # for --post to issue comments
#     pull-requests: write  # for --post to PR comments
#     discussions: write    # for --post to discussions
#
#   discussions: disabled — enable in repo Settings → General → Features
#   token scopes: gist, project, read:org, repo, workflow

