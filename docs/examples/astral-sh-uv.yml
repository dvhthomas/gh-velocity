# gh-velocity configuration
# Generated by: gh velocity config preflight -R astral-sh/uv
# Date: 2026-03-11

# Scope: which issues/PRs to analyze (GitHub search syntax).
# Override per-run with: --scope 'label:"priority:high"'
scope:
  query: "repo:astral-sh/uv"

# Issue/PR classification — first matching category wins; unmatched = "other".
# Matchers: label:<name>, type:<name>, title:/<regex>/i
quality:
  categories:
    - name: bug
      match:
        - "label:bug"
    - name: feature
      match:
        - "label:enhancement"
    - name: chore
      match:
        - "title:/^build[\\(: ]/i"
    - name: docs
      match:
        - "label:documentation"
  hotfix_window_hours: 72

# Commit message scanning
commit_ref:
  patterns: ["closes"]

# Cycle time strategy: pr
cycle_time:
  strategy: pr

# Lifecycle stages (GitHub search qualifiers).
lifecycle:
  done:
    query: "is:closed"

# Exclude bot accounts from metrics.
# These are filtered via -author: qualifiers in search queries.
# exclude_users:
#   - "dependabot[bot]"
#   - "renovate[bot]"
