# gh-velocity configuration
# Generated by: gh velocity config preflight -R cli/cli
# Date: 2026-03-11
#
# Using default issue strategy (created → closed)
# Discussions are enabled — --post can create Discussion posts
# Token scopes: gist, project, read:org, repo, workflow
# Config verification: YAML parses cleanly
# Config verification: 4 categories defined, all matchers valid

# Scope: which issues/PRs to analyze (GitHub search syntax)
# Narrow with labels, assignees, milestones, etc.:
#   query: "repo:owner/repo label:team-backend"
#   query: "org:myorg label:bug"  # org-wide
# Override per-run with: --scope 'label:"priority:high"'
scope:
  query: "repo:cli/cli"

# Issue/PR classification — assigns each item to a category.
# Each entry in 'match' is a matcher string. Supported formats:
#   label:<name>          — matches a GitHub label (case-insensitive)
#   type:<name>           — matches a GitHub Issue Type (exact)
#   title:/<regex>/       — matches the title with a Go regex
#   title:/<regex>/i      — same, but case-insensitive
# First category to match wins. Unmatched items are classified as "other".
quality:
  categories:
    - name: bug
      match:
        - "label:bug"
    - name: feature
      match:
        - "label:enhancement"
    - name: chore
      match:
        - "label:tech-debt"
    - name: docs
      match:
        - "label:docs"
  hotfix_window_hours: 72

# Match evidence (last 30 days of issues + PRs):
#   bug / label:bug — 33 matches, e.g. #12893 error parsing "input[title]" value: open @company/package...
#   bug / title:/\bfix(es|ed)?\b/i — 13 matches, e.g. #12893 error parsing "input[title]" value: open @company/package...
#   bug / title:/^fix[\(: ]/i — 11 matches, e.g. #12836 Fix extension install error message showing raw struct in...
#   bug / title:/^bug[\(: ]/i — 0 matches (review this matcher)
#   feature / label:enhancement — 37 matches, e.g. #12862 Remove a book from an embed site
#   feature / title:/^add[\(: ]/i — 18 matches, e.g. #12735 Add a title *
#   feature / title:/^feat[\(: ]/i — 5 matches, e.g. #12846 feat(repo): add --squash-merge-commit-message flag to gh ...
#   feature / title:/^feature[\(: ]/i — 2 matches, e.g. #12805 Feature request: `--json` support and finer-grained statu...
#   chore / title:/^chore[\(: ]/i — 10 matches, e.g. #12886 chore(deps): bump golang.org/x/sync from 0.19.0 to 0.20.0
#   chore / label:tech-debt — 1 matches, e.g. #12823 Deduplicate scope error handling between api/client.go an...
#   chore / title:/^refactor[\(: ]/i — 1 matches, e.g. #12845 refactor: deduplicate scope error handling between api/cl...
#   chore / title:/^build[\(: ]/i — 1 matches, e.g. #11714 build: customizable install `prefix`
#   chore / title:/^ci[\(: ]/i — 0 matches (review this matcher)
#   docs / label:docs — 2 matches, e.g. #8943 Add Code examples for the gh commands in Docs & Man page
#   docs / title:/^docs?[\(: ]/i — 1 matches, e.g. #12830 docs: add examples to gh issue close help text

# Commit message scanning
commit_ref:
  patterns: ["closes"]

# Cycle time strategy: issue
cycle_time:
  strategy: issue

# Lifecycle: how commands identify work stages
# Each stage has a query (GitHub search qualifiers) that commands append.
# With a project board, add project_status arrays for board-based filtering.
lifecycle:
  done:
    query: "is:closed"

# Posting readiness (for --post flag):
#
# Required scopes per feature:
#   --post to issue/PR comments:  repo
#   --post to discussions:        repo (+ discussions enabled)
#   project board queries:        project, read:org (if org project)
#
# GitHub Actions: set permissions in workflow YAML:
#   permissions:
#     issues: write        # for --post to issue comments
#     pull-requests: write  # for --post to PR comments
#     discussions: write    # for --post to discussions
#
#   discussions: enabled
#   token scopes: gist, project, read:org, repo, workflow

